services:
  db:
    image: mysql:8.0
    container_name: ponte_juridica_db
    environment:
      MYSQL_ROOT_PASSWORD: pontejuridica
      MYSQL_DATABASE: ponte_juridica
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: ponte_juridica_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
